# Netlify deploy config for the FFIS static site (Astro).
# Static output -> no adapter and no SPA catch-all redirect required.

[build]
  command = "astro build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Astro emits content-hashed, immutable assets under /_astro/* — cache them hard.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers for every route.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
